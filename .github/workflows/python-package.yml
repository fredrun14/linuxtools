name: Python Package

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pycodestyle

      - name: Check PEP8 compliance
        run: pycodestyle src/linuxtools/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          pip install -e ".[dev]"

      - name: Type check (mypy strict)
        run: mypy src/linuxtools/

      - name: Run tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      # L'upload d'artefact diffère selon la forge : le backend d'artefacts de
      # Forgejo refuse actions/upload-artifact@v4 (« not supported on GHES »).
      # On aiguille sur l'URL du runner (variable de contexte, aucun appel
      # réseau). Sur Forgejo, tout est résolu localement — y compris l'action
      # forgejo/upload-artifact ; le step GitHub est sauté, donc jamais résolu.
      - name: Upload artifacts (Forgejo)
        if: ${{ contains(github.server_url, 'git.ricfasohel.fr') }}
        uses: forgejo/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload artifacts (GitHub)
        if: ${{ !contains(github.server_url, 'git.ricfasohel.fr') }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
